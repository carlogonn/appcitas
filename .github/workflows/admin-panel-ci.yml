name: Admin Panel CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'admin-panel/**'
  pull_request:
    branches: [main]
    paths:
      - 'admin-panel/**'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        working-directory: ./admin-panel
        run: npm ci

      - name: Run Build
        working-directory: ./admin-panel
        run: npm run build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        working-directory: ./admin-panel
        run: npm ci

      - name: Build
        working-directory: ./admin-panel
        run: npm run build
        env:
          VITE_API_URL: https://api.appcitas.com

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./admin-panel/dist
